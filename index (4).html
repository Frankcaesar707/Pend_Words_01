<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inconsolata:wght@300;400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold2:#e8c98a;--parch:#ede0c8;--cream:rgba(237,224,200,.92);--muted:rgba(200,170,110,.55)}
html,body{width:100%;height:100%;overflow:hidden;background:#060010;cursor:none}
#cursor{position:fixed;pointer-events:none;z-index:9999;width:7px;height:7px;background:var(--gold);border-radius:50%;transform:translate(-50%,-50%);mix-blend-mode:screen;box-shadow:0 0 10px 3px rgba(200,150,255,.7)}
#cursor-ring{position:fixed;pointer-events:none;z-index:9998;width:30px;height:30px;border:1px solid rgba(220,160,255,.40);border-radius:50%;transform:translate(-50%,-50%);will-change:transform;}
canvas{position:fixed;inset:0}
#scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#moon{width:78px;height:78px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 38% 38%,#f0e8d4,#c8b898 55%,#8a7660 100%);box-shadow:0 0 28px rgba(220,200,150,.5),0 0 70px rgba(200,180,120,.25),0 0 130px rgba(180,160,100,.12);opacity:0;position:relative;margin-bottom:34px;animation:moonRise 2.5s cubic-bezier(.22,.61,.36,1) .5s forwards}
#moon::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 65% 35%,transparent 40%,rgba(0,0,0,.18) 100%)}
#moon::before{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:rgba(0,0,0,.08);top:25px;left:48px;box-shadow:-20px 11px 0 7px rgba(0,0,0,.06),7px -9px 0 4px rgba(0,0,0,.05)}
@keyframes moonRise{from{opacity:0;transform:translateY(28px) scale(.86)}to{opacity:1;transform:none}}
#name-line{font-family:'Inconsolata',monospace;font-size:.68rem;letter-spacing:.42em;color:var(--gold);text-transform:uppercase;opacity:0;margin-bottom:26px;animation:fadeUp 1.2s ease 1.8s forwards;text-shadow:0 0 20px rgba(200,150,80,.6)}
#quote-stage{position:relative;text-align:center;width:min(620px,90vw);min-height:155px;opacity:0;animation:fadeUp 1.4s ease 2.2s forwards}
.q-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px;opacity:0;transition:opacity 1.1s ease;pointer-events:none}
.q-card.active{opacity:1;pointer-events:all}
.q-orn{font-size:.85rem;color:var(--muted);margin-bottom:13px;letter-spacing:.22em}
.q-text{font-family:'IM Fell English',serif;font-size:clamp(1.1rem,3vw,1.6rem);font-style:italic;line-height:1.72;color:var(--cream);letter-spacing:.015em;text-shadow:0 0 30px rgba(255,200,255,.25),0 2px 8px rgba(0,0,0,.6)}
.q-text em{font-style:normal;color:var(--gold2);text-shadow:0 0 18px rgba(230,200,100,.5)}
.q-attr{font-family:'Inconsolata',monospace;font-size:.58rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-top:14px}
.q-orn-bot{font-size:.75rem;color:var(--muted);margin-top:12px;letter-spacing:.18em}
#dots{display:flex;gap:10px;margin-top:26px;opacity:0;animation:fadeUp .8s ease 3.4s forwards;pointer-events:all}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);cursor:pointer;transition:background .3s,transform .3s}
.dot.on{background:var(--gold);transform:scale(1.5)}
#divider{display:flex;align-items:center;gap:12px;margin-top:22px;opacity:0;animation:fadeUp .8s ease 3.7s forwards}
#divider span{font-family:'Cormorant Garamond',serif;font-size:.72rem;color:var(--muted)}
#divider::before,#divider::after{content:'';flex:1;max-width:75px;height:1px}
#divider::before{background:linear-gradient(to right,transparent,var(--muted))}
#divider::after{background:linear-gradient(to left,transparent,var(--muted))}
#sub{font-family:'Inconsolata',monospace;font-size:.63rem;letter-spacing:.27em;color:rgba(200,170,110,.55);text-transform:uppercase;margin-top:9px;opacity:0;animation:fadeUp .8s ease 4.1s forwards}
#prompt{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Inconsolata',monospace;font-size:.58rem;letter-spacing:.3em;color:rgba(255,255,255,.22);opacity:0;text-transform:uppercase;pointer-events:none;white-space:nowrap;animation:fadeUp 1s ease 5s forwards,pulse 3s ease 6s infinite}
@keyframes pulse{0%,100%{opacity:.20}50%{opacity:.58}}
#letter{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center;background:rgba(4,0,14,.96);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .9s ease;overflow-y:auto;padding:40px 20px}
#letter.open{opacity:1;pointer-events:all}
#letter-inner{max-width:560px;width:100%;margin:0 auto 40px;border:1px solid rgba(200,150,255,.14);border-radius:4px;padding:48px 44px 40px;position:relative;background:linear-gradient(160deg,rgba(10,6,28,.98),rgba(6,3,20,.98));box-shadow:0 0 80px rgba(160,80,255,.06),inset 0 1px 0 rgba(255,255,255,.04);opacity:0;transform:translateY(18px);transition:opacity 1s ease .35s,transform 1s ease .35s}
#letter.open #letter-inner{opacity:1;transform:none}
#letter-inner::before{content:'✦ ✦ ✦';position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(200,150,255,.20);font-size:.62rem;letter-spacing:.3em}
#letter-inner::after{content:'✦';position:absolute;bottom:14px;right:18px;color:rgba(200,150,255,.18);font-size:.6rem}
#letter-close{position:absolute;top:16px;right:18px;font-family:'Inconsolata',monospace;font-size:.58rem;letter-spacing:.25em;color:rgba(200,150,255,.35);cursor:pointer;text-transform:uppercase;transition:color .2s}
#letter-close:hover{color:#e8c98a}
.ltr-header{text-align:center;margin-bottom:32px;margin-top:10px}
.ltr-ornament{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--muted);letter-spacing:.32em;display:block;margin-bottom:7px}
.ltr-title{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.95rem,2.8vw,1.2rem);color:var(--parch);letter-spacing:.03em}
.ltr-rule{display:flex;align-items:center;gap:10px;margin:20px 0}
.ltr-rule::before,.ltr-rule::after{content:'';flex:1;height:1px}
.ltr-rule::before{background:linear-gradient(to right,transparent,rgba(200,150,255,.18))}
.ltr-rule::after{background:linear-gradient(to left,transparent,rgba(200,150,255,.18))}
.ltr-rule span{font-size:.58rem;color:rgba(200,150,255,.28)}
.ltr-q{margin:18px 0}
.ltr-q-text{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.88rem,2.1vw,1.02rem);color:rgba(237,224,200,.82);line-height:1.78}
.ltr-q-text em{font-style:normal;color:var(--gold2)}
.ltr-q-attr{font-family:'Inconsolata',monospace;font-size:.56rem;letter-spacing:.22em;color:rgba(180,140,200,.55);margin-top:7px;text-transform:uppercase}
.ltr-note{margin-top:26px;padding:18px 20px;border-left:1px solid rgba(200,150,255,.15);background:rgba(180,100,255,.03)}
.ltr-note p{font-family:'Cormorant Garamond',serif;font-size:clamp(.93rem,2.4vw,1.08rem);color:rgba(237,224,200,.80);line-height:1.88;font-weight:300}
.ltr-note p+p{margin-top:12px}
.ltr-sign{text-align:right;margin-top:24px;font-family:'IM Fell English',serif;font-style:italic;font-size:.88rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<script>
const HER_NAME  = "Justyna";
const YOUR_NAME = "From TJ";
const PERSONAL_NOTE = `I did not compose these words — wiser hearts than mine wrote them centuries past.\n\nBut I chose them for you.\nEvery single one.\n\nThat part is entirely mine.`;
</script>

<div id="cursor"></div><div id="cursor-ring"></div>
<canvas id="c"></canvas>

<div id="scene">
  <div id="moon"></div>
  <div id="name-line"></div>
  <div id="quote-stage"></div>
  <div id="dots"></div>
  <div id="divider"><span>✦</span></div>
  <div id="sub"></div>
</div>
<p id="prompt">unfold the letter ✦</p>

<div id="letter">
  <div id="letter-inner">
    <span id="letter-close">✕ close</span>
    <div class="ltr-header"><span class="ltr-ornament">— ✦ —</span><p class="ltr-title" id="ltr-title-text"></p></div>
    <div class="ltr-rule"><span>❧</span></div>
    <div id="ltr-quotes"></div>
    <div class="ltr-rule"><span>❧</span></div>
    <div class="ltr-note" id="ltr-note"></div>
    <div class="ltr-sign" id="ltr-sign"></div>
  </div>
</div>

<script>
const CAROUSEL=[
  {orn:"✦ ✦ ✦",text:`"She was not quite what you would call ordinary.<br>She was not quite what you would call unrefined.<br>She was the sort of person that <em>keeps a parrot</em>."`,attr:"— Mark Twain, Following the Equator, 1897",bot:"— ✦ —"},
  {orn:"✦ ✦ ✦",text:`"There is no charm equal to<br>the tenderness of heart.<br><em>None at all.</em>"`,attr:"— Jane Austen, Emma, 1815",bot:"— ✦ —"},
  {orn:"✦ ✦ ✦",text:`"<em>Jammiest bit of Jam.</em>"`,attr:"— TJ, 2026",bot:"— ✦ —"},
  {orn:"✦ ✦ ✦",text:`"She had a galaxy in her eyes,<br>a universe that <em>begged exploration.</em>"`,attr:"— Louisa May Alcott, Little Women, 1868",bot:"— ✦ —"},
  {orn:"✦ ✦ ✦",text:`"She walks in beauty, like the night<br>of cloudless climes and <em>starry skies.</em>"`,attr:"— Lord Byron, She Walks in Beauty, 1814",bot:"— ✦ —"},
];
const LETTER_QUOTES=[
  {text:`"To love at all is to be <em>vulnerable.</em> Love anything and your heart will be wrung and possibly broken."`,attr:"— C.S. Lewis, The Four Loves, 1960"},
  {text:`"I have for the first time found what I can truly love —<br>I have found <em>you.</em>"`,attr:"— Charlotte Brontë, Jane Eyre, 1847"},
  {text:`"I've learned that people will forget what you said, people will forget what you did, but people will never forget how <em>you made them feel.</em>"`,attr:"— Maya Angelou, 2003"},
  {text:`"She is a riddle of beauty<br>and I find myself studying her<br>when I ought to be attending to <em>other things.</em>"`,attr:"— Anonymous Victorian Correspondence, c. 1880"},
  {text:`"How do I love thee? Let me count the ways.<br>I love thee to the depth and breadth and height<br>my soul can <em>reach.</em>"`,attr:"— Elizabeth Barrett Browning, Sonnets from the Portuguese, 1850"},
];

document.getElementById('name-line').textContent=`— for ${HER_NAME} —`;
document.getElementById('sub').textContent=YOUR_NAME;
document.getElementById('ltr-title-text').textContent=`A small collection of sentiments, curated for ${HER_NAME}`;

const stage=document.getElementById('quote-stage'),dotsEl=document.getElementById('dots');
CAROUSEL.forEach((q,i)=>{
  const c=document.createElement('div');c.className='q-card'+(i===0?' active':'');
  c.innerHTML=`<div class="q-orn">${q.orn}</div><p class="q-text">${q.text}</p><p class="q-attr">${q.attr}</p><div class="q-orn-bot">${q.bot}</div>`;
  stage.appendChild(c);
  const d=document.createElement('div');d.className='dot'+(i===0?' on':'');
  d.addEventListener('click',()=>goTo(i));dotsEl.appendChild(d);
});
const ltrQ=document.getElementById('ltr-quotes');
LETTER_QUOTES.forEach((q,i)=>{
  const div=document.createElement('div');div.className='ltr-q';
  div.innerHTML=`<p class="ltr-q-text">${q.text}</p><p class="ltr-q-attr">${q.attr}</p>`;
  ltrQ.appendChild(div);
  if(i<LETTER_QUOTES.length-1){const r=document.createElement('div');r.className='ltr-rule';r.innerHTML='<span>✦</span>';ltrQ.appendChild(r);}
});
const noteEl=document.getElementById('ltr-note');
PERSONAL_NOTE.split('\n').forEach(l=>{const p=document.createElement('p');p.textContent=l;noteEl.appendChild(p);});
document.getElementById('ltr-sign').textContent=`— ${YOUR_NAME}`;

let cur_q=0,autoT=null;
const cards=document.querySelectorAll('.q-card'),dots=document.querySelectorAll('.dot');
function goTo(n){
  cards[cur_q].classList.remove('active');dots[cur_q].classList.remove('on');
  cur_q=(n+CAROUSEL.length)%CAROUSEL.length;
  cards[cur_q].classList.add('active');dots[cur_q].classList.add('on');
  clearInterval(autoT);autoT=setInterval(()=>goTo(cur_q+1),5400);
}
autoT=setInterval(()=>goTo(cur_q+1),5400);

const letterEl=document.getElementById('letter');
let letterOpen=false;
document.addEventListener('click',e=>{if(letterOpen||e.target.closest('#letter'))return;letterOpen=true;letterEl.classList.add('open');});
document.getElementById('letter-close').addEventListener('click',e=>{e.stopPropagation();letterOpen=false;letterEl.classList.remove('open');});

const curEl=document.getElementById('cursor'),ringEl=document.getElementById('cursor-ring');
let mx=innerWidth/2,my=innerHeight/2,pmx=.5,pmy=.5;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;pmx=e.clientX/innerWidth;pmy=e.clientY/innerHeight;
  curEl.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
ringEl.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
});

/* ══════════════════════════════════════════════════════
   NEW CANVAS ENGINE — Enchanted Nebula Garden
   Completely different from any previous version.
   
   Layers (back → front):
   1. Deep violet-black gradient
   2. Giant background nebula cloud
   3. Aurora ribbons — huge sweeping colour bands
   4. Bokeh orbs — large soft glowing spheres
   5. Dense bright starfield + cross-spike glints
   6. Floating luminous petals (rising gently)
   7. Firefly sparkles (random glow-fade)
   8. Central radiant star (illuminates text)
   9. Shooting stars (rose-gold tinted)
   10. Cursor dust trail
   11. Edge vignette
══════════════════════════════════════════════════════ */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H;

/* ─── STARS ─── */
let stars=[];
function buildStars(){
  stars=[];
  /* tiny field */
  for(let i=0;i<800;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*.62+.15,
    base:.40+Math.random()*.45,
    sp:Math.random()*.5+.15,ph:Math.random()*Math.PI*2,
    twk:Math.random()*Math.PI*2,layer:0});
  /* medium */
  for(let i=0;i<250;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.1+.55,
    base:.55+Math.random()*.35,
    sp:Math.random()*.5+.2,ph:Math.random()*Math.PI*2,
    twk:Math.random()*Math.PI*2,layer:1});
  /* bright glinting */
  for(let i=0;i<100;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.8+1.0,
    base:.70+Math.random()*.28,
    sp:Math.random()*.35+.1,ph:Math.random()*Math.PI*2,
    twk:Math.random()*Math.PI*2,layer:2});
}

/* ─── BOKEH ORBS ─── */
let orbs=[];
const ORB_COLORS=[[255,60,200],[0,200,255],[255,140,40],[160,60,255],[255,220,160],[0,255,200]];
function buildOrbs(){
  orbs=[];
  for(let i=0;i<22;i++){
    const c=ORB_COLORS[i%ORB_COLORS.length];
    orbs.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.min(W,H)*(.07+Math.random()*.14),
      c,
      al:.025+Math.random()*.045,
      vx:(Math.random()-.5)*.18,
      vy:(Math.random()-.5)*.12,
      ph:Math.random()*Math.PI*2
    });
  }
}

/* ─── GLOWING PETALS ─── */
let petals=[];
const PETAL_COLS=[[255,170,200],[255,210,225],[255,240,245],[255,185,155],[240,200,255]];
function buildPetals(){
  petals=[];
  for(let i=0;i<200;i++){
    const c=PETAL_COLS[Math.floor(Math.random()*PETAL_COLS.length)];
    petals.push({
      x:Math.random()*W,
      y:Math.random()*H+H,   // start below screen
      vx:(Math.random()-.5)*.55,
      vy:-(0.45+Math.random()*.90),
      sz:2.5+Math.random()*6.5,
      rot:Math.random()*Math.PI*2,
      rotSp:(Math.random()-.5)*.025,
      al:.25+Math.random()*.55,
      ph:Math.random()*Math.PI*2,
      c
    });
  }
}

/* ─── FIREFLY SPARKLES ─── */
let sparks=[];
function buildSparks(){
  sparks=[];
  for(let i=0;i<65;i++){
    const hue=Math.random()<.5? 300+Math.random()*60 : 30+Math.random()*50;
    sparks.push({
      x:Math.random()*W,y:Math.random()*H,
      life:Math.random(),
      dur:1.8+Math.random()*3.5,
      sp:0.006+Math.random()*0.007,
      r:1.0+Math.random()*2.8,
      hue
    });
  }
}

/* ─── SHOOTING STARS ─── */
let shooters=[];
function spawnShooter(){
  const ang=-Math.PI*.12-Math.random()*.18;
  shooters.push({
    x:Math.random()*W,y:Math.random()*H*.5,
    vx:Math.cos(ang)*16,vy:Math.sin(ang)*16,
    len:100+Math.random()*160,
    life:0,maxLife:.6+Math.random()*.5,
    hue:300+Math.random()*90   // rose-gold / magenta tint
  });
}
setInterval(()=>{if(shooters.length<5&&!letterOpen)spawnShooter();},1800);

/* ─── CURSOR DUST ─── */
const dust=Array.from({length:65},()=>({
  x:Math.random()*1000,y:Math.random()*600,
  life:Math.random(),sp:Math.random()*.3+.05,a:Math.random()*.5+.1
}));

/* ─── AURORA BAND DEFINITIONS ───
   Each band: y centre (frac), amplitude, horizontal freq, speed, hue, alpha
*/
const AURORA_BANDS=[
  {yc:.22,amp:.12,fx:3.8,sp:.28,hue:310,al:.052},  // magenta top
  {yc:.38,amp:.10,fx:4.5,sp:.22,hue:185,al:.045},  // cyan mid
  {yc:.15,amp:.14,fx:5.2,sp:.18,hue:270,al:.040},  // violet high
  {yc:.55,amp:.09,fx:3.2,sp:.32,hue:340,al:.035},  // rose low
  {yc:.28,amp:.11,fx:6.1,sp:.20,hue:200,al:.038},  // teal
  {yc:.45,amp:.10,fx:2.8,sp:.15,hue:50, al:.030},  // gold
  {yc:.10,amp:.16,fx:4.0,sp:.24,hue:295,al:.048},  // purple very high
  {yc:.65,amp:.08,fx:5.5,sp:.26,hue:160,al:.028},  // mint low
];

window.addEventListener('resize',()=>{
  W=cv.width=innerWidth;H=cv.height=innerHeight;
  buildStars();buildOrbs();buildPetals();buildSparks();
});
W=cv.width=innerWidth;H=cv.height=innerHeight;
buildStars();buildOrbs();buildPetals();buildSparks();

/* ══════════════════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════════════════ */
let T=0;
(function frame(){
  T+=.007;
  ctx.clearRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;

  /* ═══ 1. DEEP BACKGROUND ═══ */
  {
    const bg=ctx.createRadialGradient(W*.5,H*.42,0,W*.5,H*.5,Math.max(W,H)*.85);
    bg.addColorStop(0,'#0e0828');
    bg.addColorStop(.25,'#09051a');
    bg.addColorStop(.55,'#060312');
    bg.addColorStop(.82,'#040110');
    bg.addColorStop(1,'#020008');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  }

  /* ═══ 2. GIANT BACKGROUND NEBULA (fills sky with deep colour) ═══ */
  ctx.globalCompositeOperation='screen';
  {
    /* Rose-purple cloud */
    const n1=ctx.createRadialGradient(W*.35,H*.40,0,W*.35,H*.40,W*.62);
    n1.addColorStop(0,'rgba(180,60,255,.08)');
    n1.addColorStop(.35,'rgba(140,30,200,.04)');
    n1.addColorStop(.65,'rgba(100,20,160,.015)');
    n1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.rect(0,0,W,H);ctx.fillStyle=n1;ctx.fill();

    /* Cyan cloud right */
    const n2=ctx.createRadialGradient(W*.78,H*.35,0,W*.78,H*.35,W*.55);
    n2.addColorStop(0,'rgba(0,200,255,.07)');
    n2.addColorStop(.30,'rgba(0,160,220,.035)');
    n2.addColorStop(.65,'rgba(0,120,180,.010)');
    n2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.rect(0,0,W,H);ctx.fillStyle=n2;ctx.fill();

    /* Gold warmth behind text */
    const n3=ctx.createRadialGradient(W*.50,H*.52,0,W*.50,H*.52,W*.45);
    n3.addColorStop(0,'rgba(255,160,60,.05)');
    n3.addColorStop(.40,'rgba(220,100,20,.02)');
    n3.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.rect(0,0,W,H);ctx.fillStyle=n3;ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  /* ═══ 3. AURORA RIBBONS — massive sweeping curtains of colour ═══ */
  ctx.globalCompositeOperation='lighter';
  AURORA_BANDS.forEach((b,bi)=>{
    const N=110;
    const ph2=bi*1.34;
    /* Top wavy edge of the ribbon */
    const topPts=[];
    for(let i=0;i<=N;i++){
      const x=(i/N)*W;
      const y=b.yc*H
        + H*b.amp*Math.sin(x/W*b.fx*Math.PI*2 + T*b.sp + ph2)
        + H*b.amp*.45*Math.sin(x/W*b.fx*Math.PI*3.3 - T*b.sp*1.4 + ph2*.8);
      topPts.push({x,y});
    }
    const ribbonH=H*(.22+b.amp*.8+.05*Math.sin(T*.3+bi));

    /* Draw as filled shape: wavy top, straight bottom */
    ctx.beginPath();
    ctx.moveTo(0,topPts[0].y);
    topPts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(W,topPts[N].y+ribbonH);
    ctx.lineTo(0,topPts[0].y+ribbonH);
    ctx.closePath();

    const g=ctx.createLinearGradient(0,(b.yc-b.amp-.05)*H,0,(b.yc+b.amp+ribbonH/H+.05)*H);
    g.addColorStop(0,`hsla(${b.hue},100%,65%,0)`);
    g.addColorStop(.18,`hsla(${b.hue},100%,65%,${b.al})`);
    g.addColorStop(.45,`hsla(${b.hue},100%,62%,${b.al*.75})`);
    g.addColorStop(.72,`hsla(${b.hue},100%,58%,${b.al*.35})`);
    g.addColorStop(1,`hsla(${b.hue},100%,55%,0)`);
    ctx.fillStyle=g;ctx.fill();

    /* Second pass: bright inner core of ribbon */
    ctx.beginPath();
    ctx.moveTo(0,topPts[0].y);
    topPts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(W,topPts[N].y+ribbonH*.38);
    ctx.lineTo(0,topPts[0].y+ribbonH*.38);
    ctx.closePath();
    const g2=ctx.createLinearGradient(0,b.yc*H-H*.06,0,b.yc*H+ribbonH*.4);
    g2.addColorStop(0,`hsla(${b.hue},100%,75%,0)`);
    g2.addColorStop(.3,`hsla(${b.hue},100%,78%,${b.al*.6})`);
    g2.addColorStop(.7,`hsla(${b.hue},100%,70%,${b.al*.22})`);
    g2.addColorStop(1,`hsla(${b.hue},100%,65%,0)`);
    ctx.fillStyle=g2;ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';

  /* ═══ 4. BOKEH ORBS — large dreamy blurred spheres of colour ═══ */
  ctx.globalCompositeOperation='screen';
  orbs.forEach(o=>{
    o.x+=o.vx+Math.sin(T*.32+o.ph)*.12;
    o.y+=o.vy+Math.cos(T*.25+o.ph*.7)*.09;
    if(o.x<-o.r*1.5)o.x=W+o.r; if(o.x>W+o.r*1.5)o.x=-o.r;
    if(o.y<-o.r*1.5)o.y=H+o.r; if(o.y>H+o.r*1.5)o.y=-o.r;
    const pulse=1+.12*Math.sin(T*.7+o.ph);
    const r=o.r*pulse;
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,r);
    g.addColorStop(0,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},${o.al*1.6})`);
    g.addColorStop(.38,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},${o.al})`);
    g.addColorStop(.72,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},${o.al*.3})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';

  /* ═══ 5. STAR FIELD ═══ */
  stars.forEach(s=>{
    const twk=.72+.28*Math.sin(T*2.5+s.twk);
    const a=Math.min(1,s.base*.65+.32+.18*Math.sin(T*s.sp+s.ph)*twk);
    const sx=s.x+(pmx-.5)*14*s.r*(s.layer===0?.3:s.layer===1?.7:1.2);
    const sy=s.y+(pmy-.5)*9*s.r*(s.layer===0?.3:s.layer===1?.7:1.2);

    if(s.layer===2){
      /* Bright star with halo + cross-spike */
      ctx.globalCompositeOperation='lighter';
      const hr=s.r*10;
      const hg=ctx.createRadialGradient(sx,sy,0,sx,sy,hr);
      hg.addColorStop(0,`rgba(240,225,255,${a*.32})`);
      hg.addColorStop(.38,`rgba(200,180,240,${a*.12})`);
      hg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(sx,sy,hr,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
      const sp=s.r*9;
      ctx.globalAlpha=a*.22;ctx.strokeStyle='rgba(245,235,255,1)';ctx.lineWidth=.45;
      ctx.beginPath();ctx.moveTo(sx-sp,sy);ctx.lineTo(sx+sp,sy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx,sy-sp);ctx.lineTo(sx,sy+sp);ctx.stroke();
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    } else if(s.layer===1){
      const hg=ctx.createRadialGradient(sx,sy,0,sx,sy,s.r*4.5);
      hg.addColorStop(0,`rgba(220,210,245,${a*.24})`);hg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(sx,sy,s.r*4.5,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    }
    ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(235,228,255,${a})`;ctx.fill();
  });

  /* ═══ 6. GLOWING PETALS — drift upward like bioluminescent blooms ═══ */
  ctx.globalCompositeOperation='lighter';
  petals.forEach(p=>{
    p.x+=p.vx+Math.sin(T*.55+p.ph)*.40;
    p.y+=p.vy;
    p.rot+=p.rotSp;
    if(p.y<-30){p.y=H+15;p.x=Math.random()*W;}

    const glow=ctx.createRadialGradient(0,0,0,0,0,p.sz*2.2);
    glow.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.al*.65})`);
    glow.addColorStop(.5,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.al*.28})`);
    glow.addColorStop(1,'rgba(0,0,0,0)');

    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    /* soft outer bloom */
    ctx.beginPath();ctx.arc(0,0,p.sz*2.2,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
    /* petal shape — elongated oval */
    const pg=ctx.createRadialGradient(0,-p.sz*.3,0,0,0,p.sz*.9);
    pg.addColorStop(0,`rgba(255,248,255,${p.al*.9})`);
    pg.addColorStop(.4,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.al*.7})`);
    pg.addColorStop(1,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);
    ctx.beginPath();ctx.ellipse(0,0,p.sz*.42,p.sz*.92,0,0,Math.PI*2);
    ctx.fillStyle=pg;ctx.fill();
    ctx.restore();
  });
  ctx.globalCompositeOperation='source-over';

  /* ═══ 7. FIREFLY SPARKLES ═══ */
  ctx.globalCompositeOperation='lighter';
  sparks.forEach(sp=>{
    sp.life+=sp.sp;
    if(sp.life>1){sp.life=0;sp.x=Math.random()*W;sp.y=Math.random()*H;}
    const a=Math.sin(sp.life*Math.PI); // ease in/out
    if(a<.01)return;
    const g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,sp.r*5);
    g.addColorStop(0,`hsla(${sp.hue},100%,85%,${a*.80})`);
    g.addColorStop(.38,`hsla(${sp.hue},100%,70%,${a*.35})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r*.7,0,Math.PI*2);
    ctx.fillStyle=`hsla(${sp.hue},100%,95%,${a*.9})`;ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';

  /* ═══ 8. CENTRAL RADIANT STAR — warms and illuminates the text ═══ */
  {
    const sx=W*.50, sy=H*.26;
    const sr=Math.min(W,H)*.016;
    const pulse=1+.09*Math.sin(T*1.3);
    const pr=sr*pulse;
    ctx.globalCompositeOperation='lighter';

    /* Giant ambient halo — the key to making text readable */
    const h1=ctx.createRadialGradient(sx,sy,0,sx,sy,pr*52);
    h1.addColorStop(0,'rgba(255,230,255,.18)');
    h1.addColorStop(.08,'rgba(255,210,240,.12)');
    h1.addColorStop(.22,'rgba(240,185,255,.06)');
    h1.addColorStop(.45,'rgba(220,160,255,.025)');
    h1.addColorStop(.72,'rgba(180,120,220,.008)');
    h1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,pr*52,0,Math.PI*2);ctx.fillStyle=h1;ctx.fill();

    /* Warm secondary glow (gold tint) */
    const h2=ctx.createRadialGradient(sx,sy,0,sx,sy,pr*20);
    h2.addColorStop(0,'rgba(255,245,200,.15)');
    h2.addColorStop(.15,'rgba(255,220,160,.10)');
    h2.addColorStop(.40,'rgba(255,190,120,.04)');
    h2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,pr*20,0,Math.PI*2);ctx.fillStyle=h2;ctx.fill();

    /* Inner glow */
    const h3=ctx.createRadialGradient(sx,sy,0,sx,sy,pr*5);
    h3.addColorStop(0,'rgba(255,255,255,.92)');
    h3.addColorStop(.25,'rgba(255,240,255,.72)');
    h3.addColorStop(.6,'rgba(255,200,255,.28)');
    h3.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,pr*5,0,Math.PI*2);ctx.fillStyle=h3;ctx.fill();

    /* Bright core dot */
    ctx.beginPath();ctx.arc(sx,sy,pr,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,1)';ctx.fill();

    /* 4 long diffraction spikes */
    ctx.globalAlpha=.68*pulse;
    const sLen=pr*55;
    for(let si=0;si<4;si++){
      const ang=si*Math.PI*.5+T*.0035+.22;
      /* main spike */
      const gs=ctx.createLinearGradient(sx,sy,sx+Math.cos(ang)*sLen,sy+Math.sin(ang)*sLen);
      gs.addColorStop(0,'rgba(255,240,255,.80)');
      gs.addColorStop(.20,'rgba(255,200,255,.38)');
      gs.addColorStop(.55,'rgba(220,160,255,.12)');
      gs.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(sx-Math.cos(ang)*pr*.5,sy-Math.sin(ang)*pr*.5);ctx.lineTo(sx+Math.cos(ang)*sLen,sy+Math.sin(ang)*sLen);
      ctx.strokeStyle=gs;ctx.lineWidth=pr*(2.4-si*.38);ctx.stroke();
      /* opposite */
      const go=ctx.createLinearGradient(sx,sy,sx-Math.cos(ang)*sLen,sy-Math.sin(ang)*sLen);
      go.addColorStop(0,'rgba(255,235,255,.60)');go.addColorStop(.28,'rgba(240,180,255,.24)');go.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(sx+Math.cos(ang)*pr*.5,sy+Math.sin(ang)*pr*.5);ctx.lineTo(sx-Math.cos(ang)*sLen,sy-Math.sin(ang)*sLen);
      ctx.strokeStyle=go;ctx.lineWidth=pr*(1.6-si*.24);ctx.stroke();
    }
    /* 4 soft diagonal spikes */
    ctx.globalAlpha=.28*pulse;
    for(let si=0;si<4;si++){
      const ang=si*Math.PI*.5+T*.0035+.22+Math.PI*.25;
      const gd=ctx.createLinearGradient(sx,sy,sx+Math.cos(ang)*sLen*.55,sy+Math.sin(ang)*sLen*.55);
      gd.addColorStop(0,'rgba(255,220,255,.55)');gd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(ang)*sLen*.55,sy+Math.sin(ang)*sLen*.55);
      ctx.strokeStyle=gd;ctx.lineWidth=pr*.9;ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  }

  /* ═══ 9. SHOOTING STARS (rose-gold tinted) ═══ */
  shooters=shooters.filter(s=>{
    s.life+=.010;s.x+=s.vx;s.y+=s.vy;
    const p=s.life/s.maxLife;
    const al=p<.25?p/.25:p>.75?(1-p)/.25:1;
    if(al<=0||s.x<-300||s.y>H+100)return false;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len,ty=s.y-Math.sin(ang)*s.len;
    ctx.globalCompositeOperation='lighter';
    const sg=ctx.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(0,0,0,0)');
    sg.addColorStop(.45,`hsla(${s.hue},90%,75%,${al*.14})`);
    sg.addColorStop(1,`hsla(${s.hue},95%,88%,${al*.80})`);
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.strokeStyle=sg;ctx.lineWidth=1.4;ctx.stroke();
    const hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,7);
    hg.addColorStop(0,`hsla(${s.hue},100%,95%,${al*.85})`);hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,7,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    ctx.globalCompositeOperation='source-over';
    return true;
  });

  /* ═══ 10. CURSOR DUST (violet-pink tint) ═══ */
  if(!letterOpen){
    dust.forEach(d=>{
      d.life+=d.sp*.012;
      if(d.life>1){d.life=0;d.x=mx+(Math.random()-.5)*185;d.y=my+(Math.random()-.5)*185;}
      d.x+=(mx-d.x)*.003;d.y+=(my-d.y)*.003;
      const f=Math.sin(d.life*Math.PI);
      ctx.beginPath();ctx.arc(d.x,d.y,.78,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,170,255,${f*d.a})`;ctx.fill();
    });
  }

  /* ═══ 11. EDGE VIGNETTE ═══ */
  ctx.globalCompositeOperation='source-over';
  const vig=ctx.createRadialGradient(W*.5,H*.46,Math.min(W,H)*.30,W*.5,H*.5,Math.min(W,H)*.84);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(.52,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(2,0,10,.80)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
})();
</script>
</body>
